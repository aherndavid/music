<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music | Collection</title>

    <link rel="icon" type="image/png" href="assets/music-icon.png">
    <link rel="apple-touch-icon" href="assets/music-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            background-color: #000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%;
            max-width: 400px;
            background-color: #000;
            border: 3px solid #ff6600;
            box-shadow: 0 0 15px #ff6600, inset 0 0 5px #ff6600;
            padding: 15px 0;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 4px;
            animation: flicker 3s infinite;
        }

        h1 {
            font-family: "Courier New", Courier, monospace;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff6600;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.8; }
        }

        .music-grid {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .song-card {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        .song-card:active {
            transform: scale(0.96);
        }

        .icon {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            background-color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .info {
            padding-top: 15px;
            text-align: left;
        }

        .song-title {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .artist-name {
            display: block;
            font-size: 1rem;
            color: #888;
        }

        /* Active playing style */
        .playing .song-title {
            color: #ff6600;
            text-shadow: 0 0 5px #ff6600;
        }

        footer {
            margin-top: 60px;
            color: #444;
            font-size: 0.8rem;
            font-family: "Courier New", monospace;
            text-align: center;
            padding-bottom: 40px;
        }
    </style>
</head>
<body onclick="initAudio()">

    <header>
        <h1>MUSIC</h1>
    </header>

    <div class="music-grid">
        <a href="https://www.youtube.com/watch?v=8jR-TD8NWSE" class="song-card" target="_blank">
            <img src="assets/passion.png" alt="Gat Decor" class="icon">
            <div class="info">
                <span class="song-title">Passion (Naked Mix)</span>
                <span class="artist-name">Gat Decor</span>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=BvkHa7s1yGc" class="song-card" target="_blank">
            <img src="assets/candi.jpeg" alt="Candi Staton" class="icon">
            <div class="info">
                <span class="song-title">You Got the Love (1986)</span>
                <span class="artist-name">Candi Staton</span>
            </div>
        </a>

        <div class="song-card" onclick="toggleSong('life-audio', this, 'Leftfield')">
            <img src="assets/leftfield.png" alt="Leftfield" class="icon">
            <div class="info">
                <span class="song-title">Song of Life</span>
                <span class="artist-name">Leftfield (Tap to Play)</span>
            </div>
            <audio id="life-audio" class="music-player" src="https://files.catbox.moe/ao17b3.wav"></audio>
        </div>

        <div class="song-card" onclick="toggleSong('tainted-audio', this, 'Impedance')">
            <img src="assets/tainted-love-impedance.jpg" alt="Tainted Love" class="icon">
            <div class="info">
                <span class="song-title">Tainted Love (Impedance Remix)</span>
                <span class="artist-name">Impedance (Tap to Play)</span>
            </div>
            <audio id="tainted-audio" class="music-player" src="https://files.catbox.moe/3frl6t.wav"></audio>
        </div>

        <a href="https://www.youtube.com/watch?v=0_u6_n2Y6Xg" class="song-card" target="_blank">
            <img src="assets/renaissance.png" alt="Renaissance" class="icon">
            <div class="info">
                <span class="song-title">Renaissance</span>
                <span class="artist-name">The Mix Collection</span>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=zV5e5FyhnmU" class="song-card" target="_blank">
            <img src="assets/gatecrasher-late-set.png" alt="Gatecrasher Black" class="icon">
            <div class="info">
                <span class="song-title">Black (The Late Set)</span>
                <span class="artist-name">Gatecrasher</span>
            </div>
        </a>
    </div>

    <footer>
        github.com/aherndavid/music
    </footer>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playBeep();
        }

        function playBeep() {
            if (!audioCtx) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function toggleSong(audioId, cardEl, artistName) {
            const allAudios = document.querySelectorAll('.music-player');
            const allCards = document.querySelectorAll('.song-card');
            const currentAudio = document.getElementById(audioId);
            const statusText = cardEl.querySelector('.artist-name');

            // If the clicked song is already playing, pause it
            if (!currentAudio.paused) {
                currentAudio.pause();
                cardEl.classList.remove('playing');
                statusText.innerText = artistName + " (Paused)";
                return;
            }

            // Otherwise, pause ALL other songs first
            allAudios.forEach(audio => {
                audio.pause();
                audio.currentTime = 0; // Reset to start
            });

            allCards.forEach(card => {
                card.classList.remove('playing');
                // Reset text for direct play cards
                const name = card.querySelector('.artist-name');
                if(name && name.innerText.includes('Now Playing')) {
                    name.innerText = name.innerText.replace(" (Now Playing...)", " (Tap to Play)");
                }
            });

            // Play the chosen song
            currentAudio.play();
            cardEl.classList.add('playing');
            statusText.innerText = artistName + " (Now Playing...)";
        }
    </script>
</body>
</html>
