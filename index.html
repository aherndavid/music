<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music | GitHub Repo</title>
    <style>
        body {
            background-color: #000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* The Neon Header Rectangle */
        header {
            width: 100%;
            max-width: 400px;
            background-color: #000;
            border: 3px solid #ff6600;
            box-shadow: 0 0 15px #ff6600, inset 0 0 5px #ff6600;
            padding: 15px 0;
            text-align: center;
            margin-bottom: 40px;
            border-radius: 4px;
            animation: flicker 3s infinite;
        }

        h1 {
            font-family: "Courier New", Courier, monospace;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff6600;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.8; }
        }

        .music-grid {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .song-card {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent; /* Clean mobile tap */
        }

        .song-card:active {
            transform: scale(0.98);
        }

        .icon {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            background-color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        .info {
            padding-top: 15px;
            text-align: left;
        }

        .song-title {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .artist-name {
            display: block;
            font-size: 1rem;
            color: #888;
        }

        footer {
            margin-top: 60px;
            color: #333;
            font-size: 0.8rem;
            font-family: "Courier New", monospace;
        }
    </style>
</head>
<body onclick="playBeep()">

    <header>
        <h1>MUSIC</h1>
    </header>

    <div class="music-grid">
        <a href="https://www.youtube.com/watch?v=8jR-TD8NWSE" class="song-card" target="_blank">
            <img src="passion.jpg" alt="Gat Decor" class="icon">
            <div class="info">
                <span class="song-title">Passion (Naked Mix)</span>
                <span class="artist-name">Gat Decor</span>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=BvkHa7s1yGc" class="song-card" target="_blank">
            <img src="candi.jpg" alt="Candi Staton" class="icon">
            <div class="info">
                <span class="song-title">You Got the Love (1986)</span>
                <span class="artist-name">Candi Staton</span>
            </div>
        </a>

        <a href="https://www.youtube.com/watch?v=WCoAndSOF7I" class="song-card" target="_blank">
            <img src="leftfield.jpg" alt="Leftfield" class="icon">
            <div class="info">
                <span class="song-title">Song of Life</span>
                <span class="artist-name">Leftfield</span>
            </div>
        </a>
    </div>

    <footer>
        github.com/aherndavid/music
    </footer>

    <script>
        // Web Audio API Beep Function
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep() {
            // Ensure audio context is active (browsers block sound until first click)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; // Pure tone
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch beep
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volume
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1); // Quick fade

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
